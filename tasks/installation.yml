- name: Enable CodeReady Builder for RHEL (8, 9, and 10)
  community.general.rhsm_repository:
    name: "codeready-builder-for-rhel-{{ ansible_distribution_major_version }}-x86_64-rpms"
    state: enabled
  when: ansible_distribution == "RedHat"

- name: Install fedora epel repository for rhel
  ansible.builtin.yum_repository:
    name: epel-fedora-repository
    baseurl: https://dl.fedoraproject.org/pub/epel/{{ ansible_distribution_major_version }}/Everything/x86_64/
    description: Extra Packages for Enterprise Linux $releaserver - $basearch
    enabled: true
    gpgkey: https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-{{ ansible_distribution_major_version }}
  when:
    - ansible_distribution == 'RedHat'

